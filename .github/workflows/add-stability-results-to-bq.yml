name: Add Stability JSON Reports to BigQuery

on:
  workflow_dispatch:
    inputs:
      runs:
        description: "How many recent runs of main-stability.yml to add"
        required: true
        default: "5"
        type: string
      platform:
        description: "Platform to report, options: all, win, mac"
        required: true
        default: 'all'
        type: string
      include_headed:
        description: "Include headed reports or not"
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip3 install 'pipenv==2023.11.15';
          pipenv install;

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # 3.0.0
        with:
          credentials_json: ${{ secrets.GC_CREDENTIAL_STABILITY }}

      - name: Add JSON artifacts into BigQuery
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TARGET_WORKFLOW_FILE: stability-test-dispatch.yml

          D_RUNS: ${{ inputs.runs }}
          PLATFORM: ${{ inputs.platform }}
          INCLUDE_HEADED: ${{ inputs.include_headed }}

          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          BQ_TABLE: ${{ secrets.BQ_TABLE }}
        run: |
          pipenv run python scripts/add_stability_json_to_bq.py
