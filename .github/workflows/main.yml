---
name: Fx Test Execution

run-name: ${{ github.actor }} is running smoke tests
on:
  workflow_call:
    inputs:
      channel:
        description: "Channel to run tests against"
        default: "beta"
        type: string
        required: false
      job_to_run:
        required: true
        type: string
      is_pull_request:
        description: "Is this a PR?"
        default: false
        type: boolean
      test_set:
        description: "Test set to run"
        default: ''
        required: false
        type: string
      dry_run:
        description: "If true, skip downloads/installs/tests/uploads (safe dry run)"
        required: false
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      win_installer_link:
        description: 'The link to the Windows installer (win64) for the Fx under test'
        required: false
        type: string
      mac_installer_link:
        description: 'The link to the macOS installer for the Fx under test'
        required: false
        type: string
      linux_tarball_link:
        description: 'The link to the Linux tarball (linux-x86_64) for the Fx under test'
        required: false
        type: string
env:
  FX_CHANNEL: ${{ inputs.channel }}
  TESTRAIL_BASE_URL: ${{ secrets.TESTRAIL_BASE_URL }}
  TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
  TESTRAIL_USERNAME: ${{ secrets.TESTRAIL_USERNAME }}
  SVC_ACCT_DECRYPT: ${{ secrets.SVC_ACCT_DECRYPT }}

jobs:
  Test-Windows:
    if: ${{ inputs.job_to_run == 'Test-Windows' || inputs.win_installer_link }}
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Dry-run notice
        if: ${{ inputs.dry_run == true }}
        run: |
          Write-Host "DRY_RUN enabled: skipping downloads, installs, tests and uploads in this job."

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: "3.13"

      - name: Set CI Environment (Default)
        shell: pwsh
        run: |
          "STARFOX_SPLIT=$env:INPUTS_TEST_SET" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TESTRAIL_REPORT=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        env:
          INPUTS_TEST_SET: ${{ inputs.test_set }}

      - name: Set CI Environment (Manual)
        if: ${{ inputs.win_installer_link && inputs.dry_run != true }}
        shell: pwsh
        run: |
          "MANUAL=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "STARFOX_SPLIT=smoke" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Running smoke tests on supplied executable"

      - name: Set CI Environment (Scheduled Beta)
        if: ${{ inputs.job_to_run == 'Test-Windows' && inputs.is_pull_request == false && inputs.dry_run != true }}
        shell: pwsh
        run: |
          "TESTRAIL_REPORT=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Running report for most recent Beta on Windows"

      - name: Install dependencies
        run: |
          mkdir -p artifacts;
          pip3 install 'uv==0.11.18';
          uv sync;
          uv run python scripts/switch_config.py ci;
          uv sync;

      - name: Install Fx
        id: install-fx
        env:
          WIN_INSTALLER_LINK: ${{ inputs.win_installer_link }}
        if: ${{ inputs.dry_run != true }}
        shell: pwsh
        run: |
          if (-not $env:WIN_INSTALLER_LINK) {
            $fx_url = (uv run python -m scripts.collect_executables) -join ""
            if (-not $fx_url) { throw "collect_executables returned an empty Firefox URL" }
            "FX_DOWNLOAD_URL=$fx_url" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          $gecko_url = (uv run python -m scripts.collect_executables -g) -join ""
          if (-not $gecko_url) { throw "collect_executables returned an empty geckodriver URL" }
          "GECKO_DOWNLOAD_URL=$gecko_url" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $fx_version = (uv run python -m scripts.collect_executables -n) -join ""
          "FX_VERSION=$fx_version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download Geckodriver
        if: ${{ inputs.dry_run != true }}
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:GECKO_DOWNLOAD_URL -OutFile "geckodriver.zip"
          unzip geckodriver.zip
          echo "$env:GITHUB_WORKSPACE" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download Beta
        if: ${{ !inputs.win_installer_link && inputs.dry_run != true }}
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:FX_DOWNLOAD_URL -OutFile "${{ github.workspace }}\setup.exe"
          New-Item -ItemType Directory -Path "C:\Program Files\Custom Firefox" -Force

      - name: Download Executable
        if: ${{ inputs.win_installer_link && inputs.dry_run != true }}
        env:
          WIN_INSTALLER_LINK: ${{ inputs.win_installer_link }}
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "$env:WIN_INSTALLER_LINK" -OutFile "${{ github.workspace }}\setup.exe"
          New-Item -ItemType Directory -Path "C:\Program Files\Custom Firefox" -Force

      - name: Install Beta
        if: ${{ inputs.dry_run != true }}
        id: setup
        shell: pwsh
        run: |
          Start-Process -FilePath "${{ github.workspace }}\setup.exe" -ArgumentList "/S", '/D=C:\Program Files\Custom Firefox' -Wait -NoNewWindow -PassThru

      - name: Select Tests (Win)
        id: select
        shell: pwsh
        run: |
          uv sync;
          uv run python -m scripts.choose_test_split

      - name: Print Selected Tests (Win)
        if: ${{steps.select.conclusion == 'success'}}
        shell: pwsh
        run: |
          $testCount = (Get-Content selected_tests | Where-Object { $_.Trim() -ne "" }).Count
          Write-Host "Total test scripts selected: $testCount"

          Write-Host "Selected tests: "
          Get-Content selected_tests

      - name: Test Fx Version (Win)
        if: |-
          ${{
            steps.setup.conclusion == 'success' &&
            steps.select.conclusion == 'success' &&
            inputs.dry_run != true
          }}
        env:
          TESTRAIL_REPORT: false
        shell: pwsh
        run: |
          uv run python -c "import sys; print(sys.platform)"
          $env:FX_EXECUTABLE = "C:\Program Files\Custom Firefox\firefox.exe"
          Start-Process -FilePath $env:FX_EXECUTABLE -ArgumentList "--version" -Wait -NoNewWindow
          uv run pytest ".\tests\meta\test_version.py" --geckodriver=geckodriver.exe

      # --- REAL RUN: actually execute tests ---
      - name: Run Tests in Win
        if: |-
          ${{
            steps.setup.conclusion == 'success' &&
            steps.select.conclusion == 'success' &&
            inputs.dry_run != true
          }}
        shell: pwsh
        run: |
          uv run pytest $(Get-Content selected_tests) --geckodriver=geckodriver.exe
          $env:TEST_EXIT_CODE = $LASTEXITCODE
          mv artifacts artifacts-win || true
          exit $env:TEST_EXIT_CODE

      - name: Skip Telemetry for most PRs
        if: |-
          ${{
            steps.setup.conclusion == 'success' &&
            inputs.dry_run != true &&
            inputs.is_pull_request == true
          }}
        shell: pwsh
        run: |
          $origin = (git merge-base origin/main HEAD)
          $gitdiff = (git --no-pager diff --name-only $origin) -join "`n"
          Write-Host $gitdiff
          if ($gitdiff -notmatch "/glean/") {"SKIP_GLEAN=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append}

      - name: Run Telemetry Tests in Win
        if: |-
          ${{
            steps.setup.conclusion == 'success' &&
            inputs.dry_run != true
          }}
        shell: pwsh
        run: |
          $split = if ($env:STARFOX_SPLIT) { $env:STARFOX_SPLIT } else { "smoke" }
          if ($split -ne "smoke" -or $env:SKIP_GLEAN -eq "true") {exit 0}
          uv run pytest tests/glean --geckodriver=geckodriver.exe
          $env:TEST_EXIT_CODE = $LASTEXITCODE
          mv artifacts artifacts-win || true
          exit $env:TEST_EXIT_CODE
        env:
          REPORTABLE: ${{ !inputs.is_pull_request }}

      - name: Run Tests in Win (Headed)
        if: ${{ steps.setup.conclusion == 'success' && always() && inputs.dry_run != true }}
        env:
          REPORTABLE: true
        shell: pwsh
        run: |
          uv sync;
          uv run python scripts/switch_config.py ci_headed;
          uv sync;
          $env:FX_EXECUTABLE = "C:\Program Files\Custom Firefox\firefox.exe"
          uv run pytest $(Get-Content selected_tests) --geckodriver=geckodriver.exe
          $env:TEST_EXIT_CODE = $LASTEXITCODE
          rm artifacts/assets -r -Force
          Get-ChildItem -Path "artifacts" | ForEach-Object {
              $destPath = "artifacts-win\" + $_.Name
              if (-not (Test-Path -Path $destPath)) {
                  try {
                      Move-Item -Path $_.FullName -Destination $destPath
                  } catch {
                      # Ignore errors and continue
                  }
              }
          }
          exit $env:TEST_EXIT_CODE

      - name: Upload artifacts
        if: ${{ always() && github.event_name == 'pull_request' && inputs.dry_run != true }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: artifacts-win
          path: artifacts-win

  Test-MacOS:
    if: ${{ inputs.job_to_run == 'Test-MacOS' || inputs.mac_installer_link }}
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Dry-run notice
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "DRY_RUN enabled: skipping downloads, installs, tests and uploads in this job"

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: "3.13"

      - name: Set CI Environment (Default)
        run: |
          echo "STARFOX_SPLIT=${INPUTS_TEST_SET}" >> "$GITHUB_ENV"
          echo "TESTRAIL_REPORT=false" >> "$GITHUB_ENV"
        env:
          INPUTS_TEST_SET: ${{ inputs.test_set }}

      - name: Check test case numbers
        run: |
          python scripts/check_test_cases.py
          exit $?

      - name: Set CI Environment (Scheduled Beta)
        if: ${{ inputs.job_to_run == 'Test-MacOS' && inputs.is_pull_request == false && inputs.dry_run != true }}
        run: |
          echo "TESTRAIL_REPORT=true" >> "$GITHUB_ENV"
          echo "Running report for most recent Beta on MacOS"

      - name: Set CI Environment (Manual)
        if: ${{ inputs.mac_installer_link && inputs.dry_run != true }}
        run: |
          echo "MANUAL=true" >> "$GITHUB_ENV"
          echo "STARFOX_SPLIT=smoke" >> "$GITHUB_ENV"
          echo "Running smoke tests on supplied executable"

      - name: Install dependencies
        id: setup
        env:
          MANUAL_DOWNLOAD_LINK: ${{ inputs.mac_installer_link }}
        run: |
          mkdir -p artifacts;
          pip install 'uv==0.11.18';
          uv sync;
          uv run python scripts/switch_config.py ci;
          uv sync;
          if ! [ "$MANUAL_DOWNLOAD_LINK" ]; then echo "FX_DOWNLOAD_URL=$(uv run python -m scripts.collect_executables)" >> "$GITHUB_ENV"; fi
          echo "FX_VERSION=$(uv run python -m scripts.collect_executables -n)" >> "$GITHUB_ENV"
          echo "GECKO_DOWNLOAD_URL=$(uv run python -m scripts.collect_executables -g)" >> "$GITHUB_ENV"

      - name: Install Fx
        id: install-fx
        if: ${{ inputs.dry_run != true && steps.setup.conclusion == 'success'}}
        env:
          MANUAL_DOWNLOAD_LINK: ${{ inputs.mac_installer_link }}
        run:
          echo "app_name=$(bash ./scripts/collect_executables.sh | xargs -0 ./scripts/parse_executables.sh)" >> "$GITHUB_OUTPUT"

      - name: Select Tests (MacOS)
        id: select
        run: |
          uv sync;
          uv run python -m scripts.choose_test_split

      - name: Print Selected Tests (MacOS)
        if: ${{steps.select.conclusion == 'success'}}
        run: |
          test_count=$(grep -cve '^\s*$' selected_tests)
          echo "Total test scripts selected: $test_count"

          echo "Selected tests: "
          cat selected_tests

      - name: Test Fx Version (MacOS)
        if: |-
          ${{
            steps.install-fx.conclusion == 'success' &&
            steps.select.conclusion == 'success' &&
            inputs.dry_run != true
          }}
        env:
          FX_EXECUTABLE: /Volumes/${{ steps.install-fx.outputs.app_name }}/${{ steps.install-fx.outputs.app_name }}.app/Contents/MacOS/firefox
          TESTRAIL_REPORT: false
        run: |
          "$FX_EXECUTABLE" --version
          uv run pytest --fx-executable="$FX_EXECUTABLE"  tests/meta/test_version.py || TEST_EXIT_CODE=$?

      - name: Run Tests in MacOS
        if: |-
          ${{
            steps.install-fx.conclusion == 'success' &&
            steps.select.conclusion == 'success' &&
            inputs.dry_run != true
          }}
        env:
          FX_EXECUTABLE: /Volumes/${{ steps.install-fx.outputs.app_name }}/${{ steps.install-fx.outputs.app_name }}.app/Contents/MacOS/firefox
        run: |
          "$FX_EXECUTABLE" --version
          uv run pytest --fx-executable="$FX_EXECUTABLE"  $(cat selected_tests) || TEST_EXIT_CODE=$?
          mv artifacts artifacts-mac || true
          exit $TEST_EXIT_CODE

      - name: Skip Telemetry for most PRs
        if: |-
          ${{
            steps.setup.conclusion == 'success' &&
            inputs.dry_run != true &&
            inputs.is_pull_request == true
          }}
        run: |
          export ORIGIN=$(git merge-base origin/main HEAD)
          export DIFF=$(git --no-pager diff --name-only $ORIGIN)
          echo "${DIFF}"
          if ! [[ "${DIFF}" =~ "/glean/" ]]; then echo "SKIP_GLEAN=true" >> $GITHUB_ENV; fi

      - name: Run Telemetry Tests in MacOS
        if: |-
          ${{
            steps.install-fx.conclusion == 'success' &&
            inputs.dry_run != true
          }}
        env:
          FX_EXECUTABLE: /Volumes/${{ steps.install-fx.outputs.app_name }}/${{ steps.install-fx.outputs.app_name }}.app/Contents/MacOS/firefox
          REPORTABLE: ${{ !inputs.is_pull_request }}
        run: |
          "$FX_EXECUTABLE" --version
          split="${STARFOX_SPLIT:-smoke}"
          if [[ $split != "smoke" || $SKIP_GLEAN = "true" ]]; then exit 0; fi
          uv run pytest --fx-executable="$FX_EXECUTABLE" tests/glean || TEST_EXIT_CODE=$?
          mv artifacts artifacts-mac || true
          exit $TEST_EXIT_CODE

      - name: Run Tests in MacOS (Headed)
        if: ${{ steps.install-fx.conclusion == 'success' && always() && inputs.dry_run != true }}
        env:
          FX_EXECUTABLE: /Volumes/${{ steps.install-fx.outputs.app_name }}/${{ steps.install-fx.outputs.app_name }}.app/Contents/MacOS/firefox
          REPORTABLE: true
        run: |
          uv sync;
          uv run python scripts/switch_config.py ci_headed
          uv sync;
          uv run pytest --fx-executable="$FX_EXECUTABLE" $(cat selected_tests) || TEST_EXIT_CODE=$?
          mv -n artifacts/* artifacts-mac/ || true
          exit $TEST_EXIT_CODE

      - name: Upload artifacts
        if: ${{ always() && github.event_name == 'pull_request' && inputs.dry_run != true }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: artifacts-mac
          path: artifacts-mac

  Smoke-Linux:
    if: ${{ inputs.linux_tarball_link }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: "3.13"

      - name: Set CI Environment (Default)
        run: |
          echo "STARFOX_SPLIT=${INPUTS_TEST_SET}" >> "$GITHUB_ENV"
          echo "TESTRAIL_REPORT=false" >> "$GITHUB_ENV"
        env:
          INPUTS_TEST_SET: ${{ inputs.test_set }}

      - name: Check test case numbers
        run: |
          python scripts/check_test_cases.py
          exit $?

      - name: Set CI Environment (Manual)
        if: ${{ inputs.linux_tarball_link && inputs.dry_run != true }}
        run: |
          echo "MANUAL=true" >> "$GITHUB_ENV"
          echo "STARFOX_SPLIT=smoke" >> "$GITHUB_ENV"
          echo "Running smoke tests on supplied executable"

      - name: Install dependencies
        id: setup
        env:
          MANUAL_DOWNLOAD_LINK: ${{ inputs.linux_tarball_link }}
        run: |
          sudo apt install gnome-screenshot
          uname -m;
          mkdir -p artifacts;
          pip3 install 'uv==0.11.18';
          uv sync;
          uv run python scripts/switch_config.py ci_xvfb;
          uv sync;
          echo "FX_VERSION=$(uv run python -m scripts.collect_executables -n)" >> "$GITHUB_ENV"
          echo "GECKO_DOWNLOAD_URL=$(uv run python -m scripts.collect_executables -g)" >> "$GITHUB_ENV"

      - name: Install executables
        if: ${{ steps.setup.conclusion == 'success' }}
        id: install-fx
        env:
          MANUAL_DOWNLOAD_LINK: ${{ inputs.linux_tarball_link }}
        run: |
          ./scripts/collect_executables.sh
          ./firefox/firefox --version;
          #. ./keyring-unlock.sh;

      - name: Select Tests (Linux)
        if: ${{ steps.install-fx.conclusion == 'success' }}
        id: select
        run: |
          uv run python -m scripts.choose_test_split

      - name: Run Smoke Tests in Ubuntu
        if: ${{ steps.select.conclusion == 'success' && inputs.dry_run != true }}
        env:
          FX_EXECUTABLE: ./firefox/firefox
        run: |
          "$FX_EXECUTABLE" --version;
          Xvfb :99 -screen 0 '1600x1200x24' > artifacts/xvfb.log &
          DISPLAY=:99 uv run pytest --fx-executable="$FX_EXECUTABLE"  $(cat selected_tests) || TEST_EXIT_CODE=$?
          exit $TEST_EXIT_CODE

      - name: Run Smoke Tests in Ubuntu (Headed)
        if: ${{ steps.install-fx.conclusion == 'success' && always() && inputs.dry_run != true }}
        env:
          FX_EXECUTABLE: ./firefox/firefox
          REPORTABLE: true
        run: |
          uv sync;
          uv run python scripts/switch_config.py ci_xvfb_headed;
          uv sync;
          DISPLAY=:99 uv run pytest --fx-executable="$FX_EXECUTABLE" $(cat selected_tests) || TEST_EXIT_CODE=$?
          exit $TEST_EXIT_CODE

  Use-Artifacts:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs:
      - Test-Windows
      - Test-MacOS
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip3 install 'uv==0.11.18'
          uv sync

      - name: Download Windows artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: artifacts-win
          path: artifacts-win

      - name: Download MacOS artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: artifacts-mac
          path: artifacts-mac

      - name: List downloaded Windows files
        run: ls artifacts-win/

      - name: List downloaded MacOS files
        run: ls artifacts-mac/

      - name: Run script with secret
        env:
          SLACK_KEY: ${{ secrets.SLACK_KEY }}
          GCP_CREDENTIAL: ${{ secrets.GCP_CREDENTIAL }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          uv run python scripts/notifier.py
