name: Check new beta version - Functional

on:
  schedule:
    - cron: "12 * * * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-Run - If true, only report the plan; do not trigger downstream workflows."
        required: false
        default: "false"

env:
  LATEST: ""
  DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}

permissions: {}

jobs:
  Check-Beta-Version:
    runs-on: ubuntu-latest
    outputs:
      win_splits: ${{ steps.reportable.outputs.win_splits }}
      mac_splits: ${{ steps.reportable.outputs.mac_splits }}
      preview_json: ${{ steps.reportable.outputs.preview_json }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      # Coverage-driven: ask TestRail which functional splits still lack coverage
      # for each platform on the latest build, instead of choosing one by the hour.
      - name: Compute uncovered functional splits per platform
        id: reportable
        env:
          TESTRAIL_REPORT: true
          TESTRAIL_BASE_URL: ${{ secrets.TESTRAIL_BASE_URL }}
          TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
          TESTRAIL_USERNAME: ${{ secrets.TESTRAIL_USERNAME }}
          DRY_RUN: ${{ env.DRY_RUN }}
        run: |
          bash ./scripts/check_reportable_splits.sh

  Preview-Plan:
    needs:
      - Check-Beta-Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Print plan and job summary
        env:
          DRY_RUN: ${{ env.DRY_RUN }}
          WIN_SPLITS: ${{ needs.Check-Beta-Version.outputs.win_splits }}
          MAC_SPLITS: ${{ needs.Check-Beta-Version.outputs.mac_splits }}
          PREVIEW_JSON: ${{ needs.Check-Beta-Version.outputs.preview_json }}
        run:
          bash ./scripts/test_beta_preview_plan.sh

  Run-Win-Functional:
    needs:
      - Check-Beta-Version
    if: |-
      ${{
        needs.Check-Beta-Version.outputs.win_splits != '' &&
        needs.Check-Beta-Version.outputs.win_splits != '[]' &&
        !( github.event.inputs.preview_only == 'true' )
      }}
    strategy:
      fail-fast: false
      matrix:
        split: ${{ fromJson(needs.Check-Beta-Version.outputs.win_splits) }}
    uses: ./.github/workflows/main.yml
    with:
      job_to_run: Test-Windows
      test_set: ${{ matrix.split }}
    secrets: inherit

  Run-Mac-Functional:
    needs:
      - Check-Beta-Version
    if: |-
      ${{
        needs.Check-Beta-Version.outputs.mac_splits != '' &&
        needs.Check-Beta-Version.outputs.mac_splits != '[]' &&
        !( github.event.inputs.preview_only == 'true' )
      }}
    strategy:
      fail-fast: false
      matrix:
        split: ${{ fromJson(needs.Check-Beta-Version.outputs.mac_splits) }}
    uses: ./.github/workflows/main.yml
    with:
      job_to_run: Test-MacOS
      test_set: ${{ matrix.split }}
    secrets: inherit
