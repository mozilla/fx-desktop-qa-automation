name: Check new beta version - Functional

on:
  schedule:
    - cron: "12 * * * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-Run - If true, only report the plan; do not trigger downstream workflows."
        required: false
        default: "false"

env:
  DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}

permissions: {}

jobs:
  # This job discovers the available splits, converts them into JSON,
  # then exports that JSON as a job output:
  # for example: ["functional1","functional2","functional3","functional4"]
  Get-Functional-Splits:
    runs-on: ubuntu-latest
    outputs:
      functional_splits: ${{ steps.splits.outputs.functional_splits }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Get functional splits
        id: splits
        run: |
          MAX_SPLITS=$(grep -o 'functional[0-9]\+' manifests/key.yaml | sed 's/functional//' | sort -n | tail -1)

          splits="["
          for i in $(seq 1 "$MAX_SPLITS"); do
            splits="${splits}\"functional${i}\","
          done
          splits="${splits%,}]"
    
          echo "functional_splits=$splits" >> "$GITHUB_OUTPUT"

  Build-Reportable-Matrix:
    needs: Get-Functional-Splits
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Build reportable matrix
        id: matrix
        env:
          FUNCTIONAL_SPLITS: ${{ needs.Get-Functional-Splits.outputs.functional_splits }}
          TESTRAIL_REPORT: true
          TESTRAIL_BASE_URL: ${{ secrets.TESTRAIL_BASE_URL }}
          TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
          TESTRAIL_USERNAME: ${{ secrets.TESTRAIL_USERNAME }}
          DRY_RUN: ${{ env.DRY_RUN }}
        run: |
          matrix="[]"

          for split in $(echo "$FUNCTIONAL_SPLITS" | jq -r '.[]'); do
            echo "Checking reportability for $split"

            output=$(STARFOX_SPLIT="$split" bash ./scripts/check_reportable.sh)

            win=$(echo "$output" | grep -E '^win=' | tail -1 | cut -d '=' -f2)
            mac=$(echo "$output" | grep -E '^mac=' | tail -1 | cut -d '=' -f2)

            if [ "$win" = "True" ]; then
              matrix=$(jq --arg split "$split" '. + [{job_to_run: "Test-Windows", split: $split}]' <<< "$matrix")
            fi

            if [ "$mac" = "True" ]; then
              matrix=$(jq --arg split "$split" '. + [{job_to_run: "Test-MacOS", split: $split}]' <<< "$matrix")
            fi
          done

          echo "matrix=$(jq -c . <<< "$matrix")" >> "$GITHUB_OUTPUT"

  Preview-Plan:
    needs:
      - Get-Functional-Splits
      - Build-Reportable-Matrix
    runs-on: ubuntu-latest

    steps:
      - name: Print plan
        run: |
          {
            echo "## Functional beta plan"
            echo
            echo "Functional splits:"
            echo '${{ needs.Get-Functional-Splits.outputs.functional_splits }}' | jq .
            echo
            echo "Reportable matrix:"
            echo '${{ needs.Build-Reportable-Matrix.outputs.matrix }}' | jq .
          } >> "$GITHUB_STEP_SUMMARY"

  Run-Functional:
    needs: Build-Reportable-Matrix
    if: ${{ needs.Build-Reportable-Matrix.outputs.matrix != '[]' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true') }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.Build-Reportable-Matrix.outputs.matrix) }}

    uses: ./.github/workflows/main.yml
    with:
      job_to_run: ${{ matrix.job_to_run }}
      test_set: ${{ matrix.split }}
    secrets: inherit
