---
transforms:
  - fx_desktop_qa_automation_taskgraph.transforms.lint:transforms

task-defaults:
  worker-type: t-linux-wayland
  worker:
    max-run-time: 1800

tasks:
  linux:
    run:
      using: run-task
      cwd: "{checkout}"
      command: |-
        export PATH=$HOME/.local/bin:$PWD:$PATH
        curl --version
        pip3 install 'ruff==0.9.6' --break-system-packages;
        python3 -m ruff version;
        python3 -m ruff format --check;
        export EXIT_CODE=$?;
        python3 -m ruff check --select I;
        exit $(( $EXIT_CODE || $? ));
