transforms:
  - fx_desktop_qa_automation_taskgraph.transforms.smoketest:transforms
  - taskgraph.transforms.notify:transforms

task-defaults:
  label: "CI Smoke Tests"
  description: "Runs CI Smoke Tests and Notifies Slack"
  worker-type: t-linux-wayland
  worker:
    taskcluster-proxy: true
    max-run-time: 3600
    artifacts:
      - name: public/results
        path: checkouts/vcs/artifacts
        type: directory
  routes:
    - notify.slack-channel.C07AHPJ525V.on-resolved
  scopes:
    - queue:route:notify.slack-channel.C07AHPJ525V # notify mobile-alerts-sandbox on failure
    - notify:slack-channel:C07AHPJ525V

tasks:
  linux:
    run:
      using: run-task
      cwd: "{checkout}"
      command: |-
        export PATH=$HOME/.local/bin:$PWD:$PATH
        mkdir -p artifacts;
        pip3 install 'pipenv==2023.11.15' --break-system-packages;
        mv ./config/ci_pyproject.toml ./pyproject.toml;
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        export PATH=$PATH:$HOME/.cargo/bin
        . "$HOME/.cargo/env"
        pipenv install;
        export DISPLAY="${DISPLAY:-:0}"
        export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
        if [ -z "${XAUTHORITY:-}" ]; then
          for candidate in "$XDG_RUNTIME_DIR/gdm/Xauthority" "$XDG_RUNTIME_DIR"/.mutter-Xwaylandauth.* "$HOME/.Xauthority"; do
            if [ -r "$candidate" ]; then
              export XAUTHORITY="$candidate"
              break
            fi
          done
        fi
        SOURCE_XAUTHORITY="${XAUTHORITY:-}"
        if [ -n "$SOURCE_XAUTHORITY" ] && command -v xauth >/dev/null 2>&1; then
          set +x
          XAUTH_COOKIE="$(xauth -f "$SOURCE_XAUTHORITY" list 2>/dev/null | awk '/MIT-MAGIC-COOKIE-1/ { print $3; exit }')"
          if [ -n "$XAUTH_COOKIE" ]; then
            export XAUTHORITY="$HOME/.Xauthority"
            touch "$XAUTHORITY"
            chmod 600 "$XAUTHORITY"
            xauth -f "$XAUTHORITY" add "$(hostname)/unix:0" MIT-MAGIC-COOKIE-1 "$XAUTH_COOKIE"
          fi
          unset XAUTH_COOKIE
          set -x
        fi
        echo "DISPLAY=${DISPLAY:-}"
        echo "XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-}"
        echo "SOURCE_XAUTHORITY=${SOURCE_XAUTHORITY:-}"
        echo "XAUTHORITY=${XAUTHORITY:-}"
        ls -la "$XDG_RUNTIME_DIR" "$XDG_RUNTIME_DIR/gdm" "$SOURCE_XAUTHORITY" "$HOME/.Xauthority" 2>&1 || true
        if [ -n "${XAUTHORITY:-}" ]; then
          ls -l "$XAUTHORITY" || true
          command -v xauth || true
          xauth -f "$XAUTHORITY" list 2>&1 | sed -E 's/[0-9a-fA-F]{32,}/<redacted>/g' || true
        fi
        PYAUTOGUI_IMPORT_EXIT_CODE=0
        pipenv run python3 -c 'import pyautogui' || PYAUTOGUI_IMPORT_EXIT_CODE=$?
        ./scripts/collect_executables.sh;
        ./firefox/firefox --version;
        . ./scripts/keyring-unlock.sh
        if [[ ! $(python3 ./scripts/choose_test_type.py) =~ "starfox" ]]; then exit 0; fi;
        pipenv run python -m scripts.choose_test_split;
        pipenv run pytest --fx-executable ./firefox/firefox $(cat selected_tests);
        export FAILURE=$((PYAUTOGUI_IMPORT_EXIT_CODE | ${?}));
        pipenv run pytest --fx-executable ./firefox/firefox tests/glean;
        export FAILURE=$((FAILURE | ${?}));
        mv ./config/ci_pyproject_headed.toml ./pyproject.toml;
        pipenv run python -m scripts.choose_test_split;
        pipenv run pytest --fx-executable ./firefox/firefox $(cat selected_tests);
        exit $((${?} | ${FAILURE}))
    notify:
      recipients:
        - type: slack-channel
          channel-id: C07AHPJ525V
          status-type: on-defined
      content:
        slack:
          blocks: [
            {
              "type": "header",
              "text": {
                "type": "plain_text",
                "text": "firefox-desktop :firefox: ${task.metadata.name} Linux\n "
              }
            },
            {
              "type": "divider"
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Task*: <https://firefox-ci-tc.services.mozilla.com/tasks/${status.taskId}|Taskcluster>"
              }
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Owner*: ${task.metadata.owner}"
              }
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Commit*: <${task.metadata.source}>"
              }
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Test Summary*: <https://firefoxci.taskcluster-artifacts.net/${status.taskId}/0/public/results/report.html?sort=result> :debug:"
              }
            },
            {
              "type": "divider"
            },
            {
              "type": "context",
              "elements": [
                {
                  "type": "mrkdwn",
                  "text": ":testops-notify: created by Desktop QA Test Engineering"
                }
              ]
            }
          ]
          text: "{task[name]} with id $taskId has finished!"
