transforms:
  - fx_desktop_qa_automation_taskgraph.transforms.new_beta_qa:transforms
  - taskgraph.transforms.notify:transforms

task-defaults:
  label: "Test New Beta Version - Functional"
  description: "Checks for new betas, runs functional tests, reports to TestRail and Slack"
  worker-type: t-linux-wayland
  worker:
    taskcluster-proxy: true
    max-run-time: 3600
    artifacts:
      - name: public/results
        path: checkouts/vcs/artifacts
        type: directory
    env:
      TESTRAIL_REPORT: "true"
      STARFOX_SPLIT: "functional"
  routes:
    - notify.slack-channel.C07AHPJ525V.on-resolved
  scopes:
    - secrets:get:project/mozilla/fx-desktop-qa-automation/level-3/*
    - queue:route:notify.slack-channel.C07AHPJ525V # notify mobile-alerts-sandbox on failure
    - notify:slack-channel:C07AHPJ525V

tasks:
  linux:
    attributes:
      beta-func: true
    run-on-tasks-for: []
    run:
      using: run-task
      cwd: "{checkout}"
      command: |-
        export PATH=$HOME/.local/bin:$PWD:$PATH
        mkdir -p artifacts;
        pip3 install 'pipenv==2023.11.15' --break-system-packages;
        cp -f ./config/ci_pyproject.toml ./pyproject.toml;
        curl --proto '=https' --tlsv1.3 -sSf https://sh.rustup.rs | sh -s -- -y
        export PATH=$PATH:$HOME/.cargo/bin
        . "$HOME/.cargo/env"
        pipenv install;
        . ./scripts/setup-xauthority.sh
        export FX_CHANNEL="beta";
        ./scripts/collect_executables.sh;
        export FX_EXECUTABLE=./firefox/firefox;
        $FX_EXECUTABLE --version;
        . ./scripts/keyring-unlock.sh
        # Coverage-driven split selection: run whatever functional splits still
        # lack Linux coverage for the latest build, instead of picking by hour.
        SPLITS=$(pipenv run python -m scripts.reportable_splits --platform Linux --format lines --tc-creds);
        if [ -z "$SPLITS" ]; then echo "No uncovered Linux functional splits; nothing to do."; exit 0; fi
        echo "Uncovered Linux functional splits: $SPLITS";
        TESTRAIL_REPORT=false pipenv run pytest --fx-executable $FX_EXECUTABLE tests/meta/test_version.py;
        export FAILURE=0
        for split in $SPLITS; do
          export STARFOX_SPLIT="$split";
          echo "=== Running $STARFOX_SPLIT ===";
          cp -f ./config/ci_pyproject.toml ./pyproject.toml;
          unset REPORTABLE;
          pipenv run python -m scripts.choose_test_split;
          pipenv run pytest --fx-executable $FX_EXECUTABLE $(cat selected_tests);
          export FAILURE=$((FAILURE | ${?}));
          cp -f ./config/ci_pyproject_headed.toml ./pyproject.toml;
          export REPORTABLE=1;
          pipenv run pytest --fx-executable $FX_EXECUTABLE $(cat selected_tests);
          export FAILURE=$((FAILURE | ${?}));
        done
        exit $FAILURE
    notify:
      recipients:
        - type: slack-channel
          channel-id: C07AHPJ525V
          status-type: on-defined
      content:
        slack:
          blocks: [
            {
              "type": "header",
              "text": {
                "type": "plain_text",
                "text": "firefox-desktop :firefox: ${task.metadata.name} Linux\n "
              }
            },
            {
              "type": "divider"
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Task*: <https://firefox-ci-tc.services.mozilla.com/tasks/${status.taskId}|Taskcluster>"
              }
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Owner*: ${task.metadata.owner}"
              }
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Commit*: <${task.metadata.source}>"
              }
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Test Summary*: <https://firefoxci.taskcluster-artifacts.net/${status.taskId}/0/public/results/report.html?sort=result> :debug:"
              }
            },
            {
              "type": "divider"
            },
            {
              "type": "context",
              "elements": [
                {
                  "type": "mrkdwn",
                  "text": ":testops-notify: created by Desktop QA Test Engineering"
                }
              ]
            }
          ]
          text: "Cron {task[name]} with id $taskId has finished!"
